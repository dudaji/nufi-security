# =============================================================================
# 컴플라이언스 통제 카탈로그 (control coverage) — 한국 규제 증빙 팩
#
# 금융보안원 「금융분야 인공지능 보안 안내서」(2026.6) 점검항목 + 「망분리
# 혁신금융서비스(생성형 AI 연계) 보안대책」 평가기준 + **개인정보보호법(PIPA)·
# 신용정보법(CIA)·ISMS-P 인증기준** ↔ NuFi 통제 매핑표.
#
# 이 카탈로그는 **정적 데이터(원천)** 이다. report compliance 가 이 카탈로그와
# 기존 compliance 리포트 증빙(decisions/integrity_ok 등)을 결합해 항목별 충족
# 상태를 산출한다. 새 측정 없음 — read-only.
#
# 프레임워크(framework) — 항목이 속한 규제:
#   fsec-ai  — 금융분야 AI 보안 안내서 (C-* 행)
#   net-sep  — 망분리 보안대책 (M-* 행)
#   pipa     — 개인정보보호법
#   cia      — 신용정보법
#   isms-p   — ISMS-P 인증기준
#
# 교차참조(maps_to) — 동일 NuFi 통제 1개가 다중 규제를 충족할 때, 신규 규제 행이
#   재사용하는 원천 통제 id 를 명시한다(예: PIPA-23 → maps_to: C-07). "한 번 통제,
#   여러 규제 자동 증빙" — 한국 규제 증빙 팩의 핵심 가치.
#
# 충족유형(coverage_type):
#   direct        — ✅ 자동판정. eval 규칙이 기존 리포트 증빙으로 status 산출.
#   partial       — 🟡 부분충족(정적 라벨). remediation 트랙(P1~P3) 링크.
#   out_of_scope  — ⛔ 범위밖(정적 라벨, MoSCoW Won't). 초점 보호 — 명시적 비범위.
#
# eval 규칙 타입(direct 항목만):
#   action_count   {actions: [...], min: N}  — decisions.action_counts 합 > N
#   decisions_total {min: N}                  — decisions.total > N
#   field_true     {path: "<dotted>"}         — report[path] 가 truthy
#   chain_ok       {path: "<dotted to chain>"}— 체인 dict 의 ok 가 True(엄격)
#   nonempty       {path: "<dotted>"}         — dict/list 길이 > 0
#   all_of         {rules: [ ... ]}           — 모든 하위 규칙 충족
#   (존재성 검증 min:0 — 정보성, 임계 아님.)
#
# 종료코드 영향 없음: control coverage 는 **정보성**이다. 미충족 direct 가 있어도
# report compliance 종료코드는 무결성 게이트(0 정상 / 1 변조)만 따른다.
# =============================================================================
version: "1.1"

controls:
