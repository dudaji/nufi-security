# 라우팅·프로바이더 분류 (NFR3: 설정으로 백엔드/규칙 변경 가능 — SPEC M1 기준 3).
version: 1

# 앱이 호출하는 가상 모델 → 백엔드 라우팅.
routes:
  nufi-default:
    primary: private-llm        # 기본 private
    fallback: claude-3-5-sonnet # 실패/명시 시 public
  nufi-fast:
    primary: private-llm
    fallback: gpt-4o-mini

# 백엔드 정의 + egress 분류(public 여부 판정 테이블 — SPEC M1).
backends:
  private-llm:
    provider: local
    egress_class: private
    api_base: http://localhost:8000/v1
  claude-3-5-sonnet:
    provider: anthropic
    egress_class: public
    api_base: https://api.anthropic.com
  gpt-4o-mini:
    provider: openai
    egress_class: public
    api_base: https://api.openai.com/v1

# 프로바이더 → egress 분류 폴백(백엔드 미정의 모델명 대비)
provider_egress:
  local: private
  vllm: private
  ollama: private
  anthropic: public
  openai: public
  google: public
  azure: public

# --- 정책 운영 자동화 (v0.0.5 B1 · CMP-144) ---------------------------------
# 다중 프로파일 동시 운영 + 경로/테넌트별 묶기(binding). 프로파일 = 이름이 붙은
# 룰셋. 미선언 키(patterns/confidential/edm)는 base config(config/*)를 공유하고,
# policy(엔티티 동작)만 override 하는 것이 일반적이다.
# 운영: ``nufi-egress policy list|bind|snapshot|rollback|audit`` (무재기동·CMP-124).
policy_default_profile: default     # 묶이지 않은 경로의 기본 프로파일
policy_profiles:
  # default 는 선언 생략 가능 — base config(config/policy.yaml)를 그대로 쓴다.
  strict:
    description: 한국어 PII·비밀·기밀을 최대 차단(strict-kr-pii 프리셋 구체화).
    policy: config/profiles/strict/policy.yaml

# 선언 기본 묶기(경로/테넌트 키 → 프로파일). 런타임 변경은 policy bind 가
# config/policy_bindings.yaml(오버레이)에 기록하며 이 선언 위에 덮어쓴다.
policy_bindings: {}
