# 탐지 룰 외부화 (NFR3). 정규식은 선필터로 먼저 돌고, 체크섬/모델은 그 뒤에 적용된다.
# checksum: rrn | brn | luhn | none  (선필터 통과 후 추가 검증)
version: 1

korean_pii:
  - name: KR_RRN
    desc: 주민등록번호 YYMMDD-SBBBBNC
    regex: '(?<![0-9])([0-9]{6})[-\s]?([1-4][0-9]{6})(?![0-9])'
    checksum: rrn

  - name: KR_FOREIGNER_REG
    desc: 외국인등록번호 (RRN 형식, 성별코드 5-8)
    regex: '(?<![0-9])([0-9]{6})[-\s]?([5-8][0-9]{6})(?![0-9])'
    checksum: rrn

  - name: KR_BRN
    desc: 사업자등록번호 XXX-XX-XXXXX
    regex: '(?<![0-9])([0-9]{3})[-\s]?([0-9]{2})[-\s]?([0-9]{5})(?![0-9])'
    checksum: brn

  - name: KR_PHONE
    desc: 휴대폰/유선전화
    regex: '(?<![0-9])(01[016789]|0[2-6][0-9]?)[-\s.]?([0-9]{3,4})[-\s.]?([0-9]{4})(?![0-9])'
    checksum: none

  - name: CREDIT_CARD
    desc: 신용카드 (Luhn)
    regex: '(?<![0-9])([0-9]{4}[-\s]?[0-9]{4}[-\s]?[0-9]{4}[-\s]?[0-9]{1,4})(?![0-9])'
    checksum: luhn

  - name: KR_PASSPORT
    desc: 대한민국 여권번호 (구 M/S/R/O/D + 8자리, 신 M+8)
    regex: '(?<![A-Za-z0-9])([MSRODPmsrodp][0-9]{8})(?![0-9])'
    checksum: none

  - name: KR_DRIVER_LICENSE
    desc: 운전면허번호 XX-XX-XXXXXX-XX
    regex: '(?<![0-9])([0-9]{2}[-\s]?[0-9]{2}[-\s]?[0-9]{6}[-\s]?[0-9]{2})(?![0-9])'
    checksum: none

  - name: EMAIL
    desc: 이메일 주소
    regex: '(?<![A-Za-z0-9._%+\-])([A-Za-z0-9._%+\-]+@[A-Za-z0-9.\-]+\.[A-Za-z]{2,})'
    checksum: none

  # 계좌번호는 가장 일반적인 숫자-구분자 패턴이므로 마지막에 배치한다.
  # (전화/면허/카드 등 더 구체적인 규칙이 동률 시 우선하도록)
  - name: KR_ACCOUNT
    desc: 은행 계좌번호 (10-14자리, 구분자 허용)
    regex: '(?<![0-9])([0-9]{2,6}[-\s][0-9]{2,6}[-\s][0-9]{2,6}(?:[-\s][0-9]{1,6})?)(?![0-9])'
    checksum: none
    # CMP-103 §1.3 benign-FP 수정 — 구조적 오탐 제외(강한PII recall 가드 비훼손).
    # (1) ISBN-13: 978/979 + 2자리 언어코드 접두는 계좌가 아님(매치 자체가 ISBN 형태면 제외).
    exclude_match_regex: '^(?:978|979)[-\s][0-9]{2}[-\s]'
    # (2) 운송장/택배/ISBN/도서 등 비계좌 문맥이 매치 인접(±12자)에 있으면 제외.
    #     4-4-4 운송장(1234-5678-9012)은 실계좌(7669-3587-2362)와 구조 동일 →
    #     구조만으로는 분리 불가. 단, 이 제외는 '맨 계좌번호'(인접 키워드 없음)는
    #     건드리지 않으므로 강한PII recall(Must ≥0.98)을 떨어뜨리지 않는다.
    exclude_context: ['운송장', '송장', '택배', '배송', 'ISBN', '도서']

# 비밀정보(자격증명) 패턴. detect-secrets 미설치 시 기본 탐지기로 사용된다.
secrets:
  - name: AWS_ACCESS_KEY
    regex: '(?<![A-Z0-9])((?:AKIA|ASIA|AGPA|AIDA|AROA|ANPA|ANVA)[A-Z0-9]{16})(?![A-Z0-9])'
  - name: AWS_SECRET_KEY
    regex: '(?i)aws_secret[_a-z0-9]*\s*[:=]\s*["'']?([A-Za-z0-9/+]{40})["'']?'
  - name: GOOGLE_API_KEY
    regex: '(?<![A-Za-z0-9_\-])(AIza[0-9A-Za-z\-_]{35})(?![A-Za-z0-9_\-])'
  - name: SLACK_TOKEN
    regex: '(xox[baprs]-[0-9A-Za-z\-]{10,72})'
  - name: GITHUB_TOKEN
    regex: '((?:ghp|gho|ghu|ghs|ghr|github_pat)_[0-9A-Za-z_]{36,255})'
  - name: OPENAI_KEY
    regex: '(sk-(?:proj-)?[A-Za-z0-9_\-]{20,})'
  - name: ANTHROPIC_KEY
    regex: '(sk-ant-[A-Za-z0-9_\-]{20,})'
  - name: PRIVATE_KEY_BLOCK
    regex: '(-----BEGIN (?:RSA |EC |OPENSSH |DSA |PGP )?PRIVATE KEY-----)'
  - name: JWT
    regex: '(?<![A-Za-z0-9])(eyJ[A-Za-z0-9_\-]{10,}\.eyJ[A-Za-z0-9_\-]{10,}\.[A-Za-z0-9_\-]{10,})'
  - name: GENERIC_SECRET
    desc: api_key/password/secret/token = "..." 형식
    regex: '(?i)(?:api[_\-]?key|secret|passwd|password|token|access[_\-]?token)\s*[:=]\s*["'']([^\s"'']{8,})["'']'
